<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark green/black background -->
  <rect width="512" height="512" rx="100" fill="#0D1F0D"/>

  <!-- Green gradient overlay -->
  <defs>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#00C853;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#overlay)"/>

  <!-- Green border ring -->
  <circle cx="256" cy="240" r="140" fill="none" stroke="#00E676" stroke-width="4" opacity="0.3"/>

  <!-- Selection/capture box -->
  <rect x="110" y="110" width="292" height="292" rx="8"
        fill="none" stroke="#00E676" stroke-width="8" opacity="0.5"/>

  <!-- Corner indicators -->
  <circle cx="130" cy="130" r="8" fill="#00E676" opacity="0.8"/>
  <circle cx="382" cy="130" r="8" fill="#00E676" opacity="0.8"/>
  <circle cx="130" cy="382" r="8" fill="#00E676" opacity="0.8"/>
  <circle cx="382" cy="382" r="8" fill="#00E676" opacity="0.8"/>

  <!-- Green download arrow -->
  <path d="M256 180 L256 320" stroke="#00E676" stroke-width="28" stroke-linecap="round"/>
  <path d="M200 260 L256 320 L312 260" stroke="#00E676" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Green bottom bar -->
  <line x1="200" y1="360" x2="312" y2="360" stroke="#00E676" stroke-width="20" stroke-linecap="round"/>
</svg>
