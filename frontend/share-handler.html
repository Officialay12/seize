<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing share...</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .share-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
      text-align: center;
    }
    .share-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--line);
      border-top-color: var(--phosphor);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .share-loading p {
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="share-loading">
    <div class="spinner"></div>
    <h2>Processing shared content...</h2>
    <p id="share-status">Preparing your media...</p>
  </div>

  <script>
    // Get URL parameters from share
    const params = new URLSearchParams(window.location.search);
    const rawUrl = params.get('url') || '';
    const rawText = params.get('text') || '';
    const title = params.get('title') || '';

    // Many apps (Twitter/X, Instagram, etc.) share a caption with the
    // link buried inside it — e.g. "Check this out! https://tiktok.com/..."
    // — rather than a clean URL in the `url` field. Pull the first real
    // http(s) link out of whichever field actually has one.
    function extractUrl(str) {
      if (!str) return '';
      const match = str.match(/https?:\/\/[^\s]+/i);
      return match ? match[0] : '';
    }

    const url =
      extractUrl(rawUrl) || extractUrl(rawText) || extractUrl(title) || rawUrl || rawText;

    // Store in sessionStorage for the main app to pick up
    if (url) {
      sessionStorage.setItem('seize_shared_url', url);
      sessionStorage.setItem('seize_shared_title', title);
    }

    // Redirect to main app after a moment
    setTimeout(() => {
      // Check if it's a video file (gallery share)
      const isVideo = url.match(/\.(mp4|mov|avi|mkv|webm)$/i);
      const isAudio = url.match(/\.(mp3|wav|aac|flac|ogg|m4a)$/i);

      if (isVideo) {
        sessionStorage.setItem('seize_shared_mode', 'convert-video');
      } else if (isAudio) {
        sessionStorage.setItem('seize_shared_mode', 'convert-audio');
      } else {
        sessionStorage.setItem('seize_shared_mode', 'capture');
      }

      window.location.href = '/';
    }, 1500);
  </script>
</body>
</html>
